<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>热点追踪</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Aceternity-inspired dot grid background -->
  <div class="dot-grid" aria-hidden="true"></div>
  <!-- Aceternity-inspired spotlight -->
  <div class="spotlight" aria-hidden="true"></div>

  <div id="app">
    <!-- Top bar -->
    <nav class="topbar">
      <div class="topbar-left">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span class="logo-text">热点追踪</span>
        <span class="topbar-sep"></span>
        <span id="status" class="conn-badge">连接中</span>
      </div>
      <div class="topbar-right">
        <button id="refreshBtn" class="btn btn-ghost" title="刷新数据">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button id="analyzeBtn" class="btn btn-accent" title="AI 分析">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span>AI 分析</span>
        </button>
      </div>
    </nav>

    <!-- Tabs — Apple segmented control -->
    <div class="tab-nav">
      <button class="tab-item active" data-tab="trends">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        AI 热点
      </button>
      <button class="tab-item" data-tab="general">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        综合热点
      </button>
      <button class="tab-item" data-tab="keywords">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        热点监控
        <span id="alertCount" class="badge" style="display:none;">0</span>
      </button>
    </div>

    <!-- Alert banner — Aceternity moving-border -->
    <div id="alertBanner" class="alert-banner" style="display:none;">
      <div class="moving-border-box">
        <div class="alert-inner">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span id="alertText"></span>
          <button id="alertDismiss" class="btn-icon" aria-label="关闭">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- ===== TRENDS TAB ===== -->
    <main id="trendsTab" class="tab-content active">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-row">
          <div class="search-box">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="aiSearch" class="search-input" placeholder="搜索标题…" maxlength="100" />
          </div>
          <div class="toolbar-controls">
            <div class="dropdown" id="aiSortDropdown">
              <button class="dropdown-trigger" data-value="score">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                <span>最热</span>
              </button>
              <div class="dropdown-menu">
                <button class="dropdown-item active" data-value="score">最热</button>
                <button class="dropdown-item" data-value="newest">最新</button>
                <button class="dropdown-item" data-value="comments">最多互动</button>
                <button class="dropdown-item" data-value="fetchedAt">最新采集</button>
              </div>
            </div>
            <div class="dropdown multi" id="aiSourceDropdown">
              <button class="dropdown-trigger">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                <span>数据源</span>
              </button>
              <div class="dropdown-menu" id="aiSourceMenu"></div>
            </div>
            <button id="aiMoreFilters" class="btn btn-ghost btn-sm filter-toggle">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/></svg>
              筛选
            </button>
          </div>
        </div>
        <div class="toolbar-extra" id="aiFiltersPanel" style="display:none;">
          <div class="filter-group">
            <label class="filter-label">时间</label>
            <div class="time-pills" id="aiTimePills">
              <button class="pill-sm active" data-days="30">30天</button>
              <button class="pill-sm" data-days="1">今天</button>
              <button class="pill-sm" data-days="3">3天</button>
              <button class="pill-sm" data-days="7">7天</button>
              <button class="pill-sm" data-days="90">90天</button>
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">热度</label>
            <div class="time-pills" id="aiScorePills">
              <button class="pill-sm active" data-score="0">不限</button>
              <button class="pill-sm" data-score="50">中热度</button>
              <button class="pill-sm" data-score="200">高热度</button>
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">选项</label>
            <div class="filter-options">
              <label class="toggle-label"><input type="checkbox" id="aiHasUrl" /> 仅有链接</label>
              <div class="page-size-group">
                <span>每页</span>
                <select id="aiPageSize" class="select-sm">
                  <option value="20">20</option>
                  <option value="50" selected>50</option>
                  <option value="100">100</option>
                </select>
              </div>
              <button id="compactToggle" class="btn btn-ghost btn-sm" title="紧凑/宽松模式">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                紧凑
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- AI Analysis — Aceternity glow card -->
      <div id="analysisPanel" class="analysis-card" style="display:none;">
        <div class="glow-border" aria-hidden="true"></div>
        <div class="analysis-inner">
          <div class="analysis-head">
            <span class="analysis-label">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              AI 趋势分析
            </span>
            <span id="analysisTime" class="meta-text"></span>
          </div>
          <p id="analysisSummary" class="analysis-body"></p>
          <div id="analysisTopics" class="topic-chips"></div>
        </div>
      </div>

      <div id="trendsList" class="feed">
        <div class="skeleton-group">
          <div class="skeleton-line w80"></div>
          <div class="skeleton-line w60"></div>
          <div class="skeleton-line w80"></div>
          <div class="skeleton-line w40"></div>
          <div class="skeleton-line w80"></div>
        </div>
      </div>

      <div class="pagination" id="pagination"></div>
    </main>

    <!-- ===== GENERAL TRENDS TAB ===== -->
    <main id="generalTab" class="tab-content" style="display:none;">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-row">
          <div class="search-box">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="generalSearch" class="search-input" placeholder="搜索标题…" maxlength="100" />
          </div>
          <div class="toolbar-controls">
            <div class="dropdown" id="generalSortDropdown">
              <button class="dropdown-trigger" data-value="score">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                <span>最热</span>
              </button>
              <div class="dropdown-menu">
                <button class="dropdown-item active" data-value="score">最热</button>
                <button class="dropdown-item" data-value="newest">最新</button>
                <button class="dropdown-item" data-value="comments">最多互动</button>
                <button class="dropdown-item" data-value="fetchedAt">最新采集</button>
              </div>
            </div>
            <div class="dropdown multi" id="generalSourceDropdown">
              <button class="dropdown-trigger">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                <span>数据源</span>
              </button>
              <div class="dropdown-menu" id="generalSourceMenu"></div>
            </div>
            <button id="generalMoreFilters" class="btn btn-ghost btn-sm filter-toggle">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/></svg>
              筛选
            </button>
          </div>
        </div>
        <div class="toolbar-extra" id="generalFiltersPanel" style="display:none;">
          <div class="filter-group">
            <label class="filter-label">时间</label>
            <div class="time-pills" id="generalTimePills">
              <button class="pill-sm active" data-days="30">30天</button>
              <button class="pill-sm" data-days="1">今天</button>
              <button class="pill-sm" data-days="3">3天</button>
              <button class="pill-sm" data-days="7">7天</button>
              <button class="pill-sm" data-days="90">90天</button>
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">热度</label>
            <div class="time-pills" id="generalScorePills">
              <button class="pill-sm active" data-score="0">不限</button>
              <button class="pill-sm" data-score="50">中热度</button>
              <button class="pill-sm" data-score="200">高热度</button>
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-label">选项</label>
            <div class="filter-options">
              <label class="toggle-label"><input type="checkbox" id="generalHasUrl" /> 仅有链接</label>
              <div class="page-size-group">
                <span>每页</span>
                <select id="generalPageSize" class="select-sm">
                  <option value="20">20</option>
                  <option value="50" selected>50</option>
                  <option value="100">100</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="generalTrendsList" class="feed">
        <div class="skeleton-group">
          <div class="skeleton-line w80"></div>
          <div class="skeleton-line w60"></div>
          <div class="skeleton-line w80"></div>
          <div class="skeleton-line w40"></div>
          <div class="skeleton-line w80"></div>
        </div>
      </div>

      <div class="pagination" id="generalPagination"></div>
    </main>

    <!-- ===== KEYWORDS TAB ===== -->
    <section id="keywordsTab" class="tab-content" style="display:none;">
      <div class="kw-add-row">
        <div class="kw-inputs">
          <input type="text" id="keywordInput" class="input" placeholder="输入关键词，如 AI编程" maxlength="100" />
          <input type="text" id="scopeInput" class="input input-narrow" placeholder="分类" maxlength="50" />
        </div>
        <button id="addKeywordBtn" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加
        </button>
      </div>

      <div class="kw-actions-row">
        <button id="checkKeywordsBtn" class="btn btn-ghost btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          立即检查
        </button>
        <button id="collectKeywordTrendsBtn" class="btn btn-ghost btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          采集热点
        </button>
      </div>

      <div id="keywordList" class="kw-grid"></div>

      <!-- Detail panel -->
      <div id="keywordDetail" class="kw-detail" style="display:none;">
        <div class="kw-detail-head">
          <h3 id="detailTitle" class="kw-detail-title"></h3>
          <button id="closeDetail" class="btn-icon" aria-label="关闭">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="detail-tabs">
          <button class="detail-tab-btn active" data-dtab="alerts">告警</button>
          <button class="detail-tab-btn" data-dtab="ktrends">热点</button>
        </div>
        <div id="detailAlerts" class="detail-body"></div>
        <div id="detailTrends" class="detail-body" style="display:none;">
          <div class="detail-toolbar">
            <div class="dropdown" id="kwSortDropdown">
              <button class="dropdown-trigger" data-value="fetchedAt">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                <span>按时间</span>
              </button>
              <div class="dropdown-menu">
                <button class="dropdown-item active" data-value="fetchedAt">按时间</button>
                <button class="dropdown-item" data-value="score">按热度</button>
              </div>
            </div>
            <div class="time-pills" id="kwTimePills">
              <button class="pill-sm active" data-days="0">全部</button>
              <button class="pill-sm" data-days="1">今天</button>
              <button class="pill-sm" data-days="7">7天</button>
              <button class="pill-sm" data-days="30">30天</button>
            </div>
          </div>
          <div id="detailTrendsInner"></div>
        </div>
      </div>

      <div class="section-block">
        <h3 class="section-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          最近告警
        </h3>
        <div id="recentAlerts" class="recent-alerts"></div>
      </div>
    </section>

    <div id="fetchStatus" class="toast-container"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
